<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="theme-color" content="#F7F1EB" />
<title>Dra. Grisel Vargas · Ortodoncia</title>

<!-- PWA manifest inline (se puede separar en producción) -->
<link rel="apple-touch-icon" href="icon-180.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* =========================================================
   NUDE ILLUSION · Sistema de diseño
   Paleta exacta solicitada por el cliente
   ========================================================= */
:root{
  --ivory:#D8CABF;
  --mushroom:#E9D3C5;
  --rosy:#D9ADA2;
  --toffee:#A68A7E;
  --peanut:#CEAA9A;
  --rosewater:#DABCB2;

  /* Derivados para la interfaz */
  --cream:#F7F1EB;          /* fondo general */
  --cream-2:#FBF7F2;        /* fondo tarjetas suaves */
  --surface:#FFFFFF;        /* tarjetas */
  --ink:#3B322E;            /* texto principal (marrón cálido oscuro) */
  --ink-soft:#6E6259;       /* texto secundario */
  --muted:#9A8B80;          /* texto terciario */
  --line:#EADED3;           /* bordes/hairlines */
  --line-2:#F0E7DD;
  --rosy-deep:#C69187;      /* estado hover/primary presionado */
  --danger:#C0796F;         /* urgencias */
  --danger-bg:#F7E4DF;
  --ok:#8FA98A;             /* éxito */
  --ok-bg:#E7EEE4;
  --warn:#C9A15C;
  --warn-bg:#F5EBD8;

  --radius:20px;
  --radius-sm:14px;
  --radius-lg:28px;
  --shadow-sm:0 1px 2px rgba(59,50,46,.05), 0 2px 8px rgba(59,50,46,.04);
  --shadow:0 4px 14px rgba(59,50,46,.07), 0 12px 40px rgba(166,138,126,.10);
  --shadow-lg:0 12px 44px rgba(166,138,126,.20);
  --font-serif:"Fraunces", Georgia, serif;
  --font-sans:"Plus Jakarta Sans", system-ui, -apple-system, sans-serif;

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--font-sans);
  background:var(--cream);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  line-height:1.45;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px;color:var(--ink)}
a{color:inherit;text-decoration:none}

h1,h2,h3,h4{font-family:var(--font-serif);font-weight:400;letter-spacing:-.01em;margin:0;color:var(--ink)}
.serif{font-family:var(--font-serif)}

::-webkit-scrollbar{width:0;height:0}

/* ====== App shell ====== */
#root{min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:var(--cream);
     box-shadow:0 0 80px rgba(166,138,126,.12)}
.screen{padding:calc(18px + var(--safe-top)) 18px 120px}
.screen-doc{padding:calc(18px + var(--safe-top)) 18px 120px}

/* Desktop: la doctora suele usar laptop → ancho mayor cuando es panel */
@media(min-width:900px){
  .app.is-doc{max-width:1080px}
}

/* ====== Tipografía utilitaria ====== */
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--toffee)}
.h-hero{font-size:34px;line-height:1.05;font-weight:400}
.h-hero em{font-style:italic;color:var(--rosy-deep)}
.h1{font-size:26px;line-height:1.1}
.h2{font-size:20px}
.muted{color:var(--ink-soft)}
.tiny{font-size:12.5px;color:var(--muted)}
.center{text-align:center}

/* ====== Botones ====== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 20px;border-radius:999px;font-weight:600;font-size:15px;
  transition:transform .12s ease, box-shadow .2s ease, background .2s ease;}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--rosy);color:#fff;box-shadow:0 6px 18px rgba(217,173,162,.5)}
.btn-primary:hover{background:var(--rosy-deep)}
.btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
.btn-soft{background:var(--mushroom);color:var(--ink)}
.btn-danger{background:var(--danger);color:#fff}
.btn-block{width:100%}
.btn-lg{padding:16px 22px;font-size:16px}
.btn-sm{padding:9px 14px;font-size:13px}
.btn[disabled]{opacity:.45;pointer-events:none}

/* ====== Cards ====== */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);
  border:1px solid var(--line-2);padding:18px}
.card-flat{background:var(--cream-2);border:1px solid var(--line-2);border-radius:var(--radius);padding:16px}
.card-tap{transition:transform .12s ease}
.card-tap:active{transform:scale(.98)}

/* Hero card degradado con la paleta */
.hero-card{
  background:linear-gradient(135deg, var(--rosewater) 0%, var(--peanut) 60%, var(--toffee) 130%);
  color:#fff;border-radius:var(--radius-lg);padding:22px;position:relative;overflow:hidden;
  box-shadow:0 14px 40px rgba(166,138,126,.35)}
.hero-card .tooth{position:absolute;right:-18px;bottom:-24px;width:150px;opacity:.16}
.hero-card h2,.hero-card h1{color:#fff}

/* Chips / badges */
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;
  font-size:12.5px;font-weight:600;background:var(--mushroom);color:var(--ink)}
.chip-line{background:transparent;border:1px solid var(--line);color:var(--ink-soft)}
.badge{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.02em}
.badge-ok{background:var(--ok-bg);color:#5c7256}
.badge-warn{background:var(--warn-bg);color:#8a6a2a}
.badge-danger{background:var(--danger-bg);color:#a5544a}
.badge-neutral{background:var(--line-2);color:var(--ink-soft)}

/* Listas / filas */
.row{display:flex;align-items:center;gap:12px}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.stack{display:flex;flex-direction:column;gap:14px}
.stack-sm{display:flex;flex-direction:column;gap:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* Avatar */
.avatar{width:44px;height:44px;border-radius:14px;background:var(--mushroom);color:var(--toffee);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:19px;flex:0 0 auto}
.avatar-lg{width:64px;height:64px;border-radius:20px;font-size:26px}

/* Icon bubble */
.ico-b{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}

/* Inputs */
.field{display:block;margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.input,.textarea,.select{width:100%;background:var(--cream-2);border:1px solid var(--line);
  border-radius:14px;padding:13px 14px;outline:none;transition:border .15s, background .15s}
.input:focus,.textarea:focus,.select:focus{border-color:var(--rosy);background:#fff}
.textarea{min-height:90px;resize:vertical}

/* Progress ring (firma visual del sistema) */
.ring-wrap{position:relative;width:132px;height:132px;margin:0 auto}
.ring-wrap .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-wrap .val b{font-family:var(--font-serif);font-size:30px;font-weight:500;line-height:1}
.ring-wrap .val span{font-size:11px;color:var(--ink-soft);margin-top:2px}

/* barra progreso lineal */
.pbar{height:10px;border-radius:999px;background:var(--line-2);overflow:hidden}
.pbar>i{display:block;height:100%;border-radius:999px;
  background:linear-gradient(90deg,var(--rosewater),var(--rosy))}

/* ====== Bottom nav (paciente móvil) ====== */
.bottomnav{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;
  background:rgba(255,255,255,.86);backdrop-filter:blur(18px);
  border-top:1px solid var(--line-2);display:flex;padding:8px 6px calc(8px + var(--safe-bot));z-index:40}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 0;color:var(--muted);font-size:10.5px;font-weight:600}
.bottomnav button.on{color:var(--rosy-deep)}
.bottomnav button.on .nav-ic{background:var(--mushroom)}
.nav-ic{width:34px;height:26px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:background .15s}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.iconbtn{width:42px;height:42px;border-radius:14px;background:var(--surface);border:1px solid var(--line-2);
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.iconbtn .dot{position:absolute;top:9px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--danger);border:2px solid var(--surface)}

/* Sheet / modal */
.sheet-back{position:fixed;inset:0;background:rgba(59,50,46,.42);z-index:60;display:flex;align-items:flex-end;justify-content:center;overflow-y:auto;animation:fade .2s ease}
@media(min-width:820px){.sheet-back{align-items:center;padding:24px}.sheet{border-radius:24px !important;max-height:88vh !important;margin:auto}}
.sheet{width:100%;max-width:480px;background:var(--cream);border-radius:28px 28px 0 0;
  padding:22px 18px calc(22px + var(--safe-bot));max-height:92vh;overflow-y:auto;animation:up .28s cubic-bezier(.2,.8,.2,1)}
.sheet .grab{width:40px;height:5px;border-radius:99px;background:var(--line);margin:0 auto 16px}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal-back{position:fixed;inset:0;background:rgba(59,50,46,.42);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .2s ease}
.modal{width:100%;max-width:380px;background:var(--surface);border-radius:24px;padding:22px;animation:pop .22s ease}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}

/* Toast */
.toast-wrap{position:fixed;top:calc(14px + var(--safe-top));left:0;right:0;display:flex;flex-direction:column;
  align-items:center;gap:8px;z-index:90;pointer-events:none}
.toast{background:var(--ink);color:#fff;padding:12px 18px;border-radius:14px;font-size:14px;font-weight:500;
  box-shadow:var(--shadow-lg);animation:up .25s ease;max-width:90%}
.toast.ok{background:#5c7256}
.toast.err{background:var(--danger)}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .e-ic{width:64px;height:64px;border-radius:20px;background:var(--cream-2);display:flex;align-items:center;
  justify-content:center;margin:0 auto 14px}

/* Segmented */
.seg{display:flex;background:var(--cream-2);border:1px solid var(--line-2);border-radius:14px;padding:4px;gap:4px}
.seg button{flex:1;padding:9px;border-radius:11px;font-weight:600;font-size:13px;color:var(--ink-soft)}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}

/* Spinner */
.spin{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;
  animation:rot .7s linear infinite;display:inline-block}
.spin.dark{border-color:var(--line);border-top-color:var(--rosy)}
@keyframes rot{to{transform:rotate(360deg)}}

/* Skeleton */
.sk{background:linear-gradient(90deg,var(--line-2),var(--cream-2),var(--line-2));background-size:200% 100%;
  animation:sh 1.2s infinite;border-radius:10px}
@keyframes sh{to{background-position:-200% 0}}

/* fade-in list */
.fx{animation:fx .35s ease both}
@keyframes fx{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.divider{height:1px;background:var(--line-2);margin:16px 0}

/* Doctor sidebar (desktop) */
.doc-layout{display:block}
@media(min-width:900px){
  .doc-layout{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  .doc-side{display:flex !important;flex-direction:column;padding:22px 14px;border-right:1px solid var(--line-2);gap:4px;background:var(--cream-2)}
  .doc-side .ds-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:13px;font-weight:600;font-size:14px;color:var(--ink-soft)}
  .doc-side .ds-item.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}
  .doc-main{padding:26px 30px}
  .doc-bottomnav{display:none !important}
  .grid-2.doc-wide{grid-template-columns:repeat(4,1fr)}
}
.doc-side{display:none}

@media(prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>

function approxBytes(dataUrl) {

    quality = opts.quality || 0.82,

    if (!file || !file.type || file.type.indexOf("image/") !== 0) {
      const r = new FileReader();
      r.onload = () => resolve({
        dataUrl: r.result,
        type: file.type || "application/octet-stream",
        name: file.name || "archivo",
        bytes: approxBytes(r.result)
      });
      r.onerror = () => reject(new Error("read"));
      r.readAsDataURL(file);
      return;
    }
    const img = new Image();
    img.onload = () => {
      try {
        let w = img.naturalWidth || img.width,
          h = img.naturalHeight || img.height;
        const scale = Math.min(1, maxEdge / Math.max(w, h));
        w = Math.max(1, Math.round(w * scale));
        h = Math.max(1, Math.round(h * scale));
        const cv = document.createElement("canvas");
        cv.width = w;
        cv.height = h;
        const ctx = cv.getContext("2d");
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        let out = cv.toDataURL(mime, quality);
        if (mime === "image/webp" && out.indexOf("data:image/webp") !== 0) {
          out = cv.toDataURL("image/jpeg", quality);
        }
        const realType = out.slice(5, out.indexOf(";"));
        const base = (file.name || "foto").replace(/\.[^.]+$/, "");
        const ext = realType.indexOf("webp") >= 0 ? ".webp" : realType.indexOf("png") >= 0 ? ".png" : ".jpg";
        resolve({
          dataUrl: out,
          type: realType,
          name: base + ext,
          bytes: approxBytes(out)
        });
      } catch (e) {
        reject(e);
      }
    };
    img.onerror = () => reject(new Error("img"));
    const r = new FileReader();
    r.onload = () => {

    };

/* =========================================================
   MOTOR DE TRIAJE CON IA
   Usa la API de Claude (funciona dentro de claude.ai). Para
   producción en GitHub Pages, ver notas de despliegue: se
   requiere un pequeño proxy o clave propia. Incluye respaldo
   por reglas si la IA no está disponible.
   ========================================================= */
async function askTriage({
  symptom,
  urgency,
  description
}) {
  const prompt = `Eres un asistente clínico de orientación de un consultorio de odontología y ortodoncia (Dra. Grisel Vargas). No das diagnóstico definitivo: analizas los síntomas y orientas.

Caso:
- Motivo: ${symptom}
- Descripción del paciente: ${description || "(sin descripción)"}
- Urgencia que percibe el paciente (referencial, NO decisiva): ${urgency}/5

Analiza el caso por TU cuenta (no te bases en la urgencia que percibe el paciente) y devuelve SOLO un JSON válido, sin markdown:
{
 "level": "baja" | "media" | "alta",
 "recommendedService": "Ortodoncia" | "Limpieza" | "Resina" | "Extracción" | "Blanqueamiento" | "Endodoncia" | "Urgencia" | "Revisión",
 "advice": "2-3 frases empáticas para el paciente con tu evaluación preliminar",
 "causes": "posibles causas probables en 1 frase",
 "care": "qué hacer mientras tanto (autocuidado) en 1 frase",
 "doctorNote": "1 frase para la doctora con el resumen y la prioridad"
}
Criterio de urgencia: dolor intenso, hinchazón, fiebre, absceso/pus, sangrado abundante, traumatismo/diente roto con dolor => "alta". Dolor leve, sensibilidad, encías que sangran, caries sospechada => "media". Estético, limpieza, dudas de brackets sin dolor => "baja".`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: prompt
        }]
      })
    });
    const data = await res.json();
    let text = (data.content || []).map(b => b.text || "").join("").trim().replace(/```json/gi, "").replace(/```/g, "").trim();
    const p = JSON.parse(text);
    const fb = analyzeTriage({
      symptom,
      urgency,
      description
    });
    return {
      level: p.level || fb.level,
      recommendedService: p.recommendedService || fb.recommendedService,
      advice: p.advice || fb.advice,
      causes: p.causes || fb.causes,
      care: p.care || fb.care,
      doctorNote: p.doctorNote || fb.doctorNote,
      byAI: true
    };
  } catch (e) {
    return analyzeTriage({
      symptom,
      urgency,
      description
    });
  }
}

// Análisis heurístico real (funciona sin conexión a la IA): revisa síntoma + descripción, no la urgencia marcada.
function analyzeTriage({
  symptom,
  urgency,
  description
}) {
  const t = ((symptom || "") + " " + (description || "")).toLowerCase();
  const has = re => re.test(t);
  let level = "baja",
    causes = "",
    care = "",
    service = "Revisión";
  if (has(/insoportab|intens|fuerte|no puedo (dormir|comer|morder)|hinchaz|inflamad|fiebre|absceso|pus|purulent|sangrad[oa]|se (rompi|fractur|parti)|fractur|golpe|trauma|se me (cae|sali)|flojo|palpit/)) level = "alta";else if (has(/dolor|duele|sensibl|molest|cari|enc[ií]a|sangr|mal aliento|alambre|bracket|corona|empaste|se solt|mancha|hueco/)) level = "media";
  if (has(/rompi|fractur|parti|golpe|trauma|astill/)) {
    service = "Resina";
    causes = "fractura o astilladura del diente, con posible exposición de la dentina.";
    care = "evita masticar de ese lado, aplica frío si hubo golpe y no toques la zona.";
    if (has(/dolor|duele|sangr/)) level = "alta";
  } else if (has(/hinchaz|inflama|absceso|pus|fiebre|palpit/)) {
    service = "Urgencia";
    level = "alta";
    causes = "posible infección o absceso dental.";
    care = "no apliques calor; enjuaga con agua tibia con sal y acude pronto. Con fiebre alta, atención inmediata.";
  } else if (has(/enc[ií]a|sangr/)) {
    service = "Limpieza";
    causes = "gingivitis o acumulación de placa y sarro.";
    care = "cepilla suave, usa hilo dental y enjuague; evita irritar la zona.";
    if (level === "baja") level = "media";
  } else if (has(/sensibl|fr[ií]o|calor|dulce/)) {
    service = "Revisión";
    causes = "sensibilidad por desgaste del esmalte o una caries incipiente.";
    care = "usa pasta para dientes sensibles y evita bebidas muy frías o dulces.";
  } else if (has(/cari|mancha|hueco|picad/)) {
    service = "Resina";
    causes = "posible caries.";
    care = "reduce azúcares y mantén buena higiene hasta tu cita.";
    if (level === "baja") level = "media";
  } else if (has(/bracket|alambre|ortodonc|activ/)) {
    service = "Ortodoncia";
    causes = "molestia por brackets o un alambre suelto.";
    care = "si un alambre pincha, cúbrelo con cera ortodóncica; toma analgésico si lo necesitas.";
  } else if (has(/blanque|estetic|estétic|sonris|amarill/)) {
    service = has(/blanque/) ? "Blanqueamiento" : "Limpieza";
    causes = "motivo estético o de mantenimiento, sin signos de urgencia.";
    care = "mantén tu higiene habitual hasta la cita.";
  } else if (has(/dolor|duele/)) {
    service = "Urgencia";
    causes = "posible caries profunda, pulpitis o infección.";
    care = "toma tu analgésico habitual si lo usas, evita alimentos muy fríos o calientes y no apliques calor en la mejilla.";
  }
  if (!causes) {
    causes = "sin signos de alarma evidentes según lo descrito.";
    care = "mantén tu higiene y observa si los síntomas cambian.";
  }
  const advice = level === "alta" ? "Por lo que describes, conviene que te atiendan pronto. Reserva la cita más cercana; la doctora será notificada." : level === "media" ? "Conviene una revisión en los próximos días para evitar que avance. Reserva cuando te acomode." : "No se observan signos de urgencia. Puedes reservar tu cita con tranquilidad.";
  return {
    level,
    recommendedService: service,
    advice,
    causes,
    care,
    doctorNote: `${symptom}${description ? " — " + description : ""} -> prioridad ${level} (${service}).`,
    byAI: false
  };
}

        setInterval(function(){ reg.update(); }, 60000); // busca versiones nuevas cada minuto
        reg.addEventListener("updatefound", function(){
          var nuevo = reg.installing;
          if (!nuevo) return;
          nuevo.addEventListener("statechange", function(){
            if (nuevo.state === "installed" && navigator.serviceWorker.controller) {
              nuevo.postMessage("skipWaiting"); // aplica la versión nueva de inmediato
            }
          });
        });
      }).catch(function(){});
  });
  document.addEventListener("visibilitychange", function(){
    if (!document.hidden && navigator.serviceWorker.getRegistration) {
      navigator.serviceWorker.getRegistration().then(function(r){ if(r) r.update(); }).catch(function(){});
    }
  });
})();
</script>
</body>
